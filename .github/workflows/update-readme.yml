name: Update Dynamic README

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4 # Actualizado a v4 para mayor compatibilidad

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Actualizado a v4
        with:
          node-version: 20 # Recomendado usar la última estable

      - name: Install Dependencies
        run: npm install

      - name: Generate README
        run: node scripts/generate-readme.js # Asegúrate de que el archivo se llame así
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # <--- El nuevo secreto de Hugging Face
          GITHUB_USER: ${{ github.repository_owner }}

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Añadimos el archivo de caché para que persista entre ejecuciones
          git add README.md icon_cache.json 
          git commit -m "Update dynamic README and icon cache [skip ci]" || echo "No changes"
          git pull --rebase
          git push
